<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Zone | Under Maintenance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* الخلفية المطلوبة بدون تغبيش وبكامل دقتها */
        .full-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 20, 50, 0.6)), 
                        url('https://i.imgur.com/DnUcI67.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* تأثير التوهج الأزرق للنصوص */
        .glow-text {
            text-shadow: 0 0 20px rgba(0, 162, 255, 0.8), 0 0 40px rgba(0, 162, 255, 0.4);
        }

        /* صورة السيرفر الدائرية */
        .server-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #00a2ff;
            object-fit: cover;
            box-shadow: 0 0 25px rgba(0, 162, 255, 0.6);
        }

        .maintenance-tag {
            background: rgba(0, 162, 255, 0.2);
            color: #00a2ff;
            border: 1px solid #00a2ff;
            padding: 5px 20px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* قسم الأونرات */
        .owners-section {
            margin-top: 40px;
            padding: 20px;
            border-top: 1px solid rgba(0, 162, 255, 0.2);
            width: 100%;
        }

        .owner-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: rgba(0, 162, 255, 0.05);
            padding: 15px 30px;
            border-radius: 15px;
            border: 1px solid rgba(0, 162, 255, 0.1);
            transition: 0.3s;
        }

        .owner-card:hover {
            background: rgba(0, 162, 255, 0.1);
            transform: translateY(-5px);
        }

        .owner-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #00a2ff;
            object-fit: cover;
        }

        .discord-btn {
            background: #5865F2;
            color: white;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            transition: 0.3s;
        }

        .discord-btn:hover {
            background: #4752c4;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="full-bg"></div>

    <div class="relative z-10 flex flex-col items-center text-center px-6 py-10">
        
        <div class="flex flex-col md:flex-row items-center gap-8 mb-6">
            <img src="https://i.imgur.com/GA9axDq.jpeg" alt="Live Zone" class="server-img">
            
            <div class="text-right">
                <div class="maintenance-tag">UNDER MAINTENANCE | قيد الصيانة</div>
                <h1 class="text-6xl md:text-8xl font-black glow-text italic uppercase tracking-tighter">
                    LIVE <span class="text-blue-500">ZONE</span>
                </h1>
            </div>
        </div>

        <div class="max-w-xl">
            <p class="text-xl md:text-2xl text-slate-200 font-bold mb-8 leading-relaxed">
                نعمل حالياً على تطوير تجربة فريدة لكم في عالم روبلوكس.. انتظرونا قريباً بأقوى الأنظمة والمميزات.
            </p>
        </div>

        <div class="owners-section">
            <h2 class="text-blue-400 font-black mb-6 uppercase tracking-widest text-sm">OWNERS | الملاك</h2>
            <div class="flex justify-center">
                <div class="owner-card">
                    <img src="https://i.imgur.com/7fG6atc.jpeg" alt="Owner" class="owner-avatar">
                    <div class="text-right">
                        <div class="text-xs text-blue-300 font-bold">OWNER</div>
                        <div class="text-xl font-black">#-zynox</div>
                    </div>
                </div>
            </div>
        </div>

        <a href="https://discord.gg/7aPrMAYa8" target="_blank" class="discord-btn">
            <i class="fab fa-discord"></i>
            انضم إلى مجتمعنا
        </a>

    </div>

</body>
</html>
