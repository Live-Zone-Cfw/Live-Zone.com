<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Zone | Under Maintenance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        /* الخلفية المطلوبة بدون تغبيش وبكامل دقتها */
        .full-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 20, 50, 0.6)), 
                        url('https://i.imgur.com/DnUcI67.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* تأثير التوهج الأزرق للنصوص */
        .glow-text {
            text-shadow: 0 0 20px rgba(0, 162, 255, 0.8), 0 0 40px rgba(0, 162, 255, 0.4);
        }

        /* صورة السيرفر الدائرية */
        .server-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #00a2ff;
            object-fit: cover;
            box-shadow: 0 0 25px rgba(0, 162, 255, 0.6);
        }

        .maintenance-tag {
            background: rgba(0, 162, 255, 0.2);
            color: #00a2ff;
            border: 1px solid #00a2ff;
            padding: 5px 20px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="flex items-center justify-center">

    <div class="full-bg"></div>

    <div class="relative z-10 flex flex-col items-center text-center px-6">
        
        <div class="flex flex-col md:flex-row items-center gap-8 mb-6">
            <img src="https://i.imgur.com/GA9axDq.jpeg" alt="Live Zone" class="server-img">
            
            <div class="text-right">
                <div class="maintenance-tag">UNDER MAINTENANCE | قيد الصيانة</div>
                <h1 class="text-6xl md:text-8xl font-black glow-text italic uppercase tracking-tighter">
                    LIVE <span class="text-blue-500">ZONE</span>
                </h1>
            </div>
        </div>

        <div class="max-w-xl">
            <p class="text-xl md:text-2xl text-slate-200 font-bold mb-8 leading-relaxed">
                نعمل حالياً على تطوير تجربة فريدة لكم في عالم روبلوكس.. انتظرونا قريباً بأقوى الأنظمة والمميزات.
            </p>
        </div>

    </div>

</body>
</html>
