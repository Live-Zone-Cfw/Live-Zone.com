<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Zone | Under Maintenance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        
        * { scroll-behavior: smooth; }
        body { 
            font-family: 'Tajawal', sans-serif; 
            margin: 0; padding: 0;
            background-color: #000;
            color: white;
            overflow-x: hidden;
        }

        nav {
            position: fixed;
            top: 0; width: 100%;
            z-index: 100;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 162, 255, 0.1);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-links a {
            margin: 0 20px;
            font-weight: 700;
            transition: 0.3s;
        }
        .nav-links a:hover { color: #00a2ff; }

        .nav-discord {
            background: linear-gradient(90deg, #00a2ff 0%, #0055ff 100%);
            padding: 8px 25px;
            border-radius: 8px;
            font-weight: 900;
            box-shadow: 0 4px 15px rgba(0, 162, 255, 0.3);
            transition: 0.3s;
        }
        .nav-discord:hover { transform: scale(1.05); }

        #intro {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 1s cubic-bezier(0.85, 0, 0.15, 1);
        }

        #typewriter {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00a2ff;
            min-height: 1.6em;
        }

        .full-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 20, 50, 0.7)), 
                        url('https://i.imgur.com/DnUcI67.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .reveal {
            opacity: 0;
            transform: translateY(50px) scale(0.9);
            transition: all 1s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .glow-text { text-shadow: 0 0 20px rgba(0, 162, 255, 0.8); }

        .server-img {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 4px solid #00a2ff;
            object-fit: cover;
            box-shadow: 0 0 30px rgba(0, 162, 255, 0.6);
        }

        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px 20px;
        }

        .owner-card, .form-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(0, 162, 255, 0.2);
            width: 100%;
            max-width: 600px;
        }

        .form-group { margin-bottom: 25px; text-align: right; }

        input, textarea {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 162, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
            color: white;
            width: 100%;
            outline: none;
            margin-top: 8px;
        }
        input:focus { border-color: #00a2ff; }

        .btn-primary {
            background: #00a2ff;
            padding: 15px;
            border-radius: 10px;
            font-weight: 900;
            width: 100%;
            transition: 0.3s;
        }

        .review-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border-right: 4px solid #00a2ff;
            text-align: right;
        }

        .scroll-down {
            position: absolute;
            bottom: 30px;
            animation: bounce 2s infinite;
            color: #00a2ff;
            font-size: 2rem;
        }

        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
    </style>
</head>
<body>

    <div id="intro">
        <h2 class="text-4xl font-black text-white mb-4 italic">LIVE <span class="text-blue-500">ZONE</span></h2>
        <div id="typewriter"></div>
    </div>

    <nav>
        <div class="text-xl font-black italic">LIVE <span class="text-blue-500">ZONE</span></div>
        <div class="hidden md:flex nav-links">
            <a href="#hero">الرئيسية</a>
            <a href="#owners">الأونرات</a>
            <a href="#reviews">التقييمات</a>
        </div>
        <a href="https://discord.gg/7aPrMAYa8" target="_blank" class="nav-discord">ديسكورد</a>
    </nav>

    <div class="full-bg"></div>

    <section id="hero">
        <div class="reveal flex flex-col items-center text-center">
            <div class="bg-blue-500/20 text-blue-400 border border-blue-500 px-5 py-1 rounded-full font-black text-sm mb-8">UNDER MAINTENANCE | قيد الصيانة</div>
            <div class="flex flex-col md:flex-row items-center gap-10 mb-8">
                <img src="https://i.imgur.com/GA9axDq.jpeg" alt="Live Zone" class="server-img">
                <h1 class="text-7xl md:text-9xl font-black glow-text italic uppercase">LIVE <span class="text-blue-500">ZONE</span></h1>
            </div>
            <p class="max-w-2xl text-xl font-bold text-slate-200">نعمل حالياً على تطوير تجربة فريدة لكم في عالم روبلوكس.. انتظرونا قريباً.</p>
        </div>
        <a href="#owners" class="scroll-down"><i class="fas fa-chevron-down"></i></a>
    </section>

    <section id="owners">
        <div class="reveal flex flex-col items-center w-full">
            <div class="owner-card flex flex-col items-center gap-6">
                <div class="relative">
                    <img src="https://i.imgur.com/7fG6atc.jpeg" alt="Owner" class="w-32 h-32 rounded-full border-4 border-blue-500 shadow-2xl">
                    <div class="absolute -bottom-2 -right-2 bg-blue-500 text-black px-3 py-1 rounded-lg font-black text-xs">OWNER</div>
                </div>
                <div class="text-center">
                    <h3 class="text-4xl font-black tracking-tighter">#-zynox</h3>
                    <p class="text-blue-400 font-bold mt-2">مؤسس السيرفر</p>
                </div>
            </div>
        </div>
        <a href="#reviews" class="scroll-down"><i class="fas fa-chevron-down"></i></a>
    </section>

    <section id="reviews">
        <div class="reveal flex flex-col items-center w-full px-4">
            
            <div id="start-form-container">
                <button onclick="confirmEntry()" class="bg-blue-600 hover:bg-blue-700 px-10 py-4 rounded-xl font-bold text-xl transition-all shadow-lg">هل أنت متأكد أنك تود التقييم؟</button>
            </div>

            <div id="evaluation-form" class="hidden form-card mt-8">
                <div class="form-group">
                    <label class="font-bold text-blue-400">اسمك :</label>
                    <input type="text" id="reviewer-name" placeholder="أدخل اسمك هنا...">
                </div>
                
                <div class="form-group">
                    <label class="font-bold text-blue-400">عمرك :</label>
                    <input type="number" id="reviewer-age" placeholder="أدخل عمرك...">
                </div>
                
                <div class="form-group">
                    <label class="font-bold text-blue-400">تقييمك :</label>
                    <textarea id="reviewer-comment" rows="3" placeholder="اكتب تقييمك هنا..."></textarea>
                </div>
                
                <button onclick="submitReview()" class="btn-primary">إرسال التقييم</button>
            </div>

            <div class="w-full max-w-2xl mt-16">
                <h3 class="text-2xl font-black mb-8 text-right border-b border-blue-500/30 pb-2">أحدث التقييمات</h3>
                <div id="reviews-list"></div>
            </div>
        </div>
    </section>

    <script>
        const text = "جاري تحضير أفضل بيئة رول بلاي...";
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++; setTimeout(typeWriter, 100);
            } else {
                setTimeout(() => {
                    document.getElementById("intro").style.transform = "translateY(-100%)";
                    setTimeout(activateReveals, 500);
                    loadReviews();
                }, 1000);
            }
        }

        function confirmEntry() {
            document.getElementById('start-form-container').classList.add('hidden');
            document.getElementById('evaluation-form').classList.remove('hidden');
        }

        function submitReview() {
            const name = document.getElementById('reviewer-name').value;
            const age = document.getElementById('reviewer-age').value;
            const comment = document.getElementById('reviewer-comment').value;
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });

            if(name && age && comment) {
                const reviewData = { name, age, comment, time: timeStr };
                saveReview(reviewData);
                renderReview(reviewData);
                
                document.getElementById('reviewer-name').value = '';
                document.getElementById('reviewer-age').value = '';
                document.getElementById('reviewer-comment').value = '';
                alert('تم حفظ تقييمك بنجاح!');
            } else { alert('الرجاء تعبئة جميع الحقول'); }
        }

        function saveReview(review) {
            let reviews = JSON.parse(localStorage.getItem('livezone_reviews')) || [];
            reviews.unshift(review);
            localStorage.setItem('livezone_reviews', JSON.stringify(reviews));
        }

        function loadReviews() {
            let reviews = JSON.parse(localStorage.getItem('livezone_reviews')) || [];
            reviews.forEach(r => renderReview(r));
        }

        function renderReview(data) {
            const reviewsList = document.getElementById('reviews-list');
            const item = document.createElement('div');
            item.className = 'review-item animate-pulse-once';
            item.innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <span class="font-black text-blue-400">${data.name}</span>
                    <span class="text-xs text-gray-400">العمر: ${data.age} | ${data.time}</span>
                </div>
                <p class="text-sm leading-relaxed">${data.comment}</p>
            `;
            reviewsList.appendChild(item);
        }

        function activateReveals() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(r => observer.observe(r));
        }

        window.onload = typeWriter;
    </script>
</body>
</html>
