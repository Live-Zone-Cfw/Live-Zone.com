<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Zone | Under Maintenance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        
        * { scroll-behavior: smooth; }
        body { 
            font-family: 'Tajawal', sans-serif; 
            margin: 0; padding: 0;
            background-color: #000;
            color: white;
            overflow-x: hidden;
        }

        /* شريط التنقل العلوي */
        nav {
            position: fixed;
            top: 0; width: 100%;
            z-index: 100;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 162, 255, 0.1);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-links a {
            margin: 0 20px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nav-links a:hover { color: #00a2ff; }

        .nav-discord {
            background: linear-gradient(90deg, #00a2ff 0%, #0055ff 100%);
            padding: 8px 25px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 0.8rem;
            box-shadow: 0 4px 15px rgba(0, 162, 255, 0.3);
            transition: 0.3s;
        }
        .nav-discord:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(0, 162, 255, 0.5); }

        /* شاشة التحميل (Intro) */
        #intro {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 1s cubic-bezier(0.85, 0, 0.15, 1);
        }

        #typewriter {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00a2ff;
            min-height: 1.6em;
            text-align: center;
        }

        /* الخلفية الثابتة للموقع */
        .full-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 20, 50, 0.7)), 
                        url('https://i.imgur.com/DnUcI67.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* أنيميشن الظهور القوي */
        .reveal {
            opacity: 0;
            transform: translateY(50px) scale(0.9);
            transition: all 1s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .glow-text { text-shadow: 0 0 20px rgba(0, 162, 255, 0.8), 0 0 40px rgba(0, 162, 255, 0.4); }

        .server-img {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 4px solid #00a2ff;
            object-fit: cover;
            box-shadow: 0 0 30px rgba(0, 162, 255, 0.6);
        }

        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
        }

        .maintenance-tag {
            background: rgba(0, 162, 255, 0.2);
            color: #00a2ff;
            border: 1px solid #00a2ff;
            padding: 5px 20px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 14px;
        }

        .owner-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 30px 60px;
            border-radius: 20px;
            border: 1px solid rgba(0, 162, 255, 0.2);
            transition: 0.4s;
        }
        .owner-card:hover {
            border-color: #00a2ff;
            background: rgba(0, 162, 255, 0.1);
            transform: scale(1.05);
        }

        .discord-btn {
            background: #5865F2;
            padding: 15px 40px;
            border-radius: 12px;
            font-weight: 900;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.3);
        }
        .discord-btn:hover { transform: translateY(-5px); background: #4752c4; }

        .scroll-down {
            position: absolute;
            bottom: 30px;
            animation: bounce 2s infinite;
            color: #00a2ff;
            font-size: 2rem;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>

    <div id="intro">
        <h2 class="text-4xl font-black text-white mb-4 italic tracking-widest">LIVE <span class="text-blue-500">ZONE</span></h2>
        <div id="typewriter"></div>
    </div>

    <nav>
        <div class="text-xl font-black italic">LIVE <span class="text-blue-500">ZONE</span></div>
        <div class="hidden md:flex nav-links">
            <a href="#hero">الرئيسية</a>
            <a href="#owners">الأونرات</a>
        </div>
        <a href="https://discord.gg/7aPrMAYa8" target="_blank" class="nav-discord">ديسكورد</a>
    </nav>

    <div class="full-bg"></div>

    <section id="hero">
        <div class="reveal flex flex-col items-center text-center">
            <div class="maintenance-tag mb-8 uppercase">Under Maintenance | قيد الصيانة</div>
            
            <div class="flex flex-col md:flex-row items-center gap-10 mb-8">
                <img src="https://i.imgur.com/GA9axDq.jpeg" alt="Live Zone" class="server-img">
                <h1 class="text-7xl md:text-9xl font-black glow-text italic uppercase">
                    LIVE <span class="text-blue-500">ZONE</span>
                </h1>
            </div>

            <p class="max-w-2xl text-xl md:text-2xl text-slate-200 font-bold leading-relaxed mb-10">
                نعمل حالياً على تطوير تجربة فريدة لكم في عالم روبلوكس.. انتظرونا قريباً بأقوى الأنظمة والمميزات.
            </p>
        </div>
        <a href="#owners" class="scroll-down"><i class="fas fa-chevron-down"></i></a>
    </section>

    <section id="owners">
        <div class="reveal flex flex-col items-center text-center w-full">
            <h2 class="text-5xl font-black mb-16 italic"><span class="text-blue-500">#</span> الملاك</h2>
            
            <div class="owner-card flex flex-col items-center gap-6">
                <div class="relative">
                    <img src="https://i.imgur.com/7fG6atc.jpeg" alt="Owner" class="w-32 h-32 rounded-full border-4 border-blue-500 shadow-2xl">
                    <div class="absolute -bottom-2 -right-2 bg-blue-500 text-black px-3 py-1 rounded-lg font-black text-xs">OWNER</div>
                </div>
                <div>
                    <h3 class="text-4xl font-black tracking-tighter">#-zynox</h3>
                    <p class="text-blue-400 font-bold mt-2">مؤسس السيرفر</p>
                </div>
            </div>

            <div class="mt-20">
                <a href="https://discord.gg/7aPrMAYa8" target="_blank" class="discord-btn text-xl">
                    <i class="fab fa-discord ml-2"></i> انضم إلى مجتمعنا
                </a>
            </div>
        </div>
    </section>

    <script>
        const text = "جاري تحضير أفضل بيئة رول بلاي...";
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            } else {
                setTimeout(() => {
                    document.getElementById("intro").style.transform = "translateY(-100%)";
                    setTimeout(activateReveals, 500);
                }, 1000);
            }
        }

        function activateReveals() {
            const reveals = document.querySelectorAll('.reveal');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.1 });

            reveals.forEach(reveal => observer.observe(reveal));
        }

        window.onload = typeWriter;
    </script>
</body>
</html>
